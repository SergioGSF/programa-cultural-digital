<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Pernambuco - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-navbar">
        <div class="logo-area">
            <span class="logo-icon">AP</span>
            <span>Arena Pernambuco</span>
        </div>
    </header>

    <div class="wrapper">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li class="active">
                    <i class="fas fa-lock"></i> Login
                </li>
                <li>
                    <a th:href="@{/cadastro}">
                        <i class="fas fa-user-plus"></i> Cadastro
                    </a>
                </li>
                <li>
                    <i class="fas fa-info-circle"></i> Sobre
                </li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="login-card">
                <div class="card-header">
                    <h2>Identificação</h2>
                    <p>Acesse o painel do sistema</p>
                </div>

                <form th:action="@{/login}" method="post" class="login-form">
                    <div class="input-box">
                        <label>E-mail</label>
                        <input type="email" name="username" placeholder="seu@email.com" required>
                    </div>

                    <div class="input-box">
                        <label>Senha</label>
                        <input type="password" name="password" placeholder="Sua senha" required>
                    </div>

                    <button type="submit" class="btn-entrar">ENTRAR NO SISTEMA</button>
                </form>

                <div class="card-footer">
                    Não possui conta? <a th:href="@{/cadastro}">Cadastre-se</a>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
